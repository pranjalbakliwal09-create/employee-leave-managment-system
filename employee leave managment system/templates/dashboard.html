{% extends 'layout.html' %}

{% block content %}

<h1>Welcome {{ user[1] }}</h1>

<div class="card shadow p-4 mb-4">

    <h3>Leave Summary</h3>

    <p>Total Leaves: {{ user[5] }}</p>
    <p>Used Leaves: {{ user[6] }}</p>
    <p>Remaining Leaves: {{ user[5] - user[6] }}</p>

</div>

<a href="/request_leave" class="btn btn-success">
    Request Leave
</a>

<a href="/history/{{ user[0] }}" class="btn btn-dark">
    Leave History
</a>

{% endblock %}

{% extends 'layout.html' %}

{% block content %}

<h1>Leave History</h1>

<table class="table table-bordered">

<tr>
    <th>Type</th>
    <th>Days</th>
    <th>Reason</th>
    <th>Status</th>
</tr>

{% for item in history %}

<tr>

    <td>{{ item[2] }}</td>
    <td>{{ item[3] }}</td>
    <td>{{ item[4] }}</td>
    <td>{{ item[5] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
